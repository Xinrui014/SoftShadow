datasets:
  train:
    name: SRD_sam_train
    mode: HR
    dataroot: ./dataset/SRD_DHAN_mask_old/train
    gt_mask_dir: /home/xinrui/projects/ShadowDiffusion/dataset/ISTD_adjusted_C/train/FDRNet_mask
#    gt_mask_dir: ./dataset/ISTD_adjusted_C/train/train_B
    batch_size: 8
    val_data_len: 4
    num_workers: 8
    use_shuffle: true
  test:
    name: SRD_sam_val
    mode: LRHR
    dataroot: ./dataset/SRD_sam_mask_B/test
    gt_mask_dir: /home/xinrui/projects/ShadowDiffusion/dataset/SRD_sam_mask_B/test/test_B
#    gt_mask_dir: ./dataset/ISTD_adjusted_C/test/test_B
    data_len: -1
    batch_size: 1

model:
  which_model_G: sr3
  unet:
    in_channel: 7
    out_channel: 3
    inner_channel: 64
    norm_groups: 16
    channel_multiplier:
      - 1
      - 2
      - 4
      - 8
    attn_res:
      - 16
    res_blocks: 2
    dropout: 0
  beta_schedule:
    train:
      schedule: linear
      n_timestep: 1000
      linear_start: 1e-4
      linear_end: 0.02
    val:
      schedule: linear
      n_timestep: 1000
      linear_start: 1e-4
      linear_end: 0.02
  diffusion:
    image_size: 512
    channels: 3
    conditional: true

